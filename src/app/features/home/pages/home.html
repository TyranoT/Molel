<div class="hero-landing">
  <header class="flex flex-row items-center justify-between gap-4 px-5 py-4 md:px-10 lg:px-14">
    <h1 class="font-sora text-3xl font-semibold tracking-wider text-auxiliar md:text-4xl">
      <a routerLink="/" class="text-inherit no-underline">Molel</a>
    </h1>

    <nav class="font-ibm relative flex flex-row items-center gap-4 text-base text-auxiliar md:gap-5 md:text-lg">
      <button #btnSobre type="button"
        class="inline-flex cursor-pointer border-0 bg-transparent p-0 text-base text-auxiliar outline-none md:text-lg">
        <span class="relative inline-block">
          Sobre
          <span class="pointer-events-none absolute bottom-0 left-0 right-0 h-0.5 origin-bottom bg-auxiliar"
            data-nav-line aria-hidden="true"></span>
        </span>
      </button>
      <div class="h-[26px] border-l border-auxiliar/80 md:h-[30px]"></div>
      <button #btnContato type="button"
        class="inline-flex cursor-pointer border-0 bg-transparent p-0 text-base text-auxiliar outline-none md:text-lg">
        <span class="relative inline-block">
          Contato
          <span class="pointer-events-none absolute bottom-0 left-0 right-0 h-0.5 origin-bottom bg-auxiliar"
            data-nav-line aria-hidden="true"></span>
        </span>
      </button>
    </nav>

    <a routerLink="/canvas">
      <button hlmBtn type="button"
        class="font-sora! inline-flex cursor-pointer shrink-0 border-0 bg-principal text-auxiliar hover:principal/70 text-sm md:text-base">
        Acessar
      </button>
    </a>
  </header>
  <section
    class="grid flex-1 grid-cols-1 items-center gap-10 h-[calc(100dvh-4.5rem)] px-8 pb-16 pt-6 md:gap-12 md:px-10 md:pb-20 lg:grid-cols-2 lg:gap-16 lg:px-14 lg:pb-24">
    <div class="flex max-w-xl flex-col gap-8">
      <div
        class="font-ibm inline-flex w-fit items-center gap-2 rounded-full border border-white/10 bg-auxiliar/95 px-3 py-1.5 text-sm text-principal shadow-sm md:text-[0.9375rem]">
        <span class="size-2 shrink-0 rounded-full bg-[#4fd1c5]" aria-hidden="true"></span>
        <span>Em Desenvolvimento</span>
      </div>

      <h2 class="font-sora text-3xl font-bold leading-[1.15] tracking-tight text-auxiliar md:text-4xl lg:text-5xl">
        Transforme estruturas moleculares em conhecimento
      </h2>

      <div class="flex flex-wrap items-center gap-3 md:gap-4">
        <a routerLink="/canvas">
          <button hlmBtn type="button"
            class="font-sora! border-0 cursor-pointer bg-principal text-auxiliar hover:principal/70 md:min-h-10 md:px-6">
            Acessar
          </button>
        </a>
        <button hlmBtn type="button" [variant]="'outline'"
          class="font-sora! bg-auxiliar cursor-pointer text-principal hover:principal/70 md:min-h-10 md:px-6">
          Contato
        </button>
      </div>
    </div>

    <div class="flex justify-center lg:justify-end">
      <img src="/icons/molecular-structure.svg" alt=""
        class="pointer-events-none w-full max-w-[280px] select-none opacity-95 brightness-0 invert md:max-w-[340px] lg:max-w-[400px]"
        width="400" height="400" />
    </div>
  </section>
</div>
